services:
  - type: web
    name: aura-lms-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && FLASK_APP=run.py flask db upgrade
    startCommand: gunicorn --bind 0.0.0.0:$PORT run:app
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://aura-learning-management-system.vercel.app,http://localhost:5173
